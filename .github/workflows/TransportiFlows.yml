name: Extract iFlow IDs from CPI Package

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Technical Package ID'
        required: true
        type: string

jobs:
  extract-iflow-ids:
    runs-on: ubuntu-latest
    steps:
      # ------------------------------------------------------------
      # 1. OAuth2 Token holen (Client Credentials Grant)
      # ------------------------------------------------------------
      - name: Get OAuth Token
        env:
          UAA_TOKEN_URL: ${{ secrets.UAA_TOKEN_URL }}
          UAA_CLIENT_ID: ${{ secrets.CPI_USER }}
          UAA_CLIENT_SECRET: ${{ secrets.CPI_PASSWORD }}
        run: |
          echo "Fetching OAuth token..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$UAA_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "$UAA_CLIENT_ID:$UAA_CLIENT_SECRET" \
            -d "grant_type=client_credentials")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Token-Request fehlgeschlagen (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
          
          echo "$BODY" | jq -r '.access_token' > oauth_token.txt
          echo "Token erhalten (Länge: $(wc -c < oauth_token.txt))"

      # ------------------------------------------------------------
      # 2. GET: Alle Designtime Artifacts des Packages abrufen
      # ------------------------------------------------------------
      - name: Get Designtime Artifacts
        env:
          CPI_BASE_URL: ${{ secrets.CPI_BASE_URL }}
          PACKAGE_ID: ${{ github.event.inputs.package_id }}
        run: |
          echo "Package ID: $PACKAGE_ID"
          
          URL="$CPI_BASE_URL/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts"
          
          curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $(cat oauth_token.txt)" \
            -H "Accept: application/xml" \
            "$URL" \
            -o artifacts_response.xml
          
          HTTP_STATUS=$(tail -n1 artifacts_response.xml)
          sed -i '$d' artifacts_response.xml
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "GET fehlgeschlagen (HTTP $HTTP_STATUS)"
            cat artifacts_response.xml
            exit 1
          fi
          
          echo "Response erfolgreich erhalten"

      # ------------------------------------------------------------
      # 3. d:Id UND d:Version extrahieren (Atom XML)
      # ------------------------------------------------------------
      - name: Extract d:Id and d:Version from Atom XML (Python)
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import sys
          import json

          ns = {
              'atom': 'http://www.w3.org/2005/Atom',
              'm':   'http://schemas.microsoft.com/ado/2007/08/dataservices/metadata',
              'd':   'http://schemas.microsoft.com/ado/2007/08/dataservices'
          }

          try:
              tree = ET.parse('artifacts_response.xml')
              root = tree.getroot()

              artifacts = []

              for props in root.findall('.//atom:entry/m:properties', ns):
                  id_elem = props.find('d:Id', ns)
                  ver_elem = props.find('d:Version', ns)

                  if id_elem is not None and ver_elem is not None:
                      artifacts.append({
                          "id": id_elem.text.strip(),
                          "version": ver_elem.text.strip()
                      })

              if not artifacts:
                  print("Keine Artifacts gefunden.", file=sys.stderr)
                  sys.exit(1)

              # --- Ausgabe im Log ---
              print("Extrahierte Artifacts:")
              for a in artifacts:
                  print(f"- {a['id']} (Version {a['version']})")

              print(f"\nAnzahl: {len(artifacts)}")

              # --- JSON speichern (empfohlen für Weiterverarbeitung) ---
              with open('artifacts.json', 'w') as f:
                  json.dump(artifacts, f, indent=2)

              # --- TXT speichern (optional) ---
              with open('artifacts.txt', 'w') as f:
                  for a in artifacts:
                      f.write(f"{a['id']}:{a['version']}\n")

              print("\nGespeichert in:")
              print("- artifacts.json")
              print("- artifacts.txt")

          except Exception as e:
              print(f"Fehler beim Parsen: {str(e)}", file=sys.stderr)
              sys.exit(1)
          EOF

          # Ergebnisse anzeigen
          echo "======================================"
          echo "artifacts.txt:"
          cat artifacts.txt
          echo "======================================"
