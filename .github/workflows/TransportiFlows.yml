name: Extract iFlow IDs from CPI Package

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Technical Package ID'
        required: true
        type: string

permissions:
  contents: write

jobs:
  extract-iflow-ids:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 0. Checkout Repository
      # ------------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------
      # 1. OAuth2 Token holen (Client Credentials)
      # ------------------------------------------------------------
      - name: Get OAuth Token
        env:
          UAA_TOKEN_URL: ${{ secrets.UAA_TOKEN_URL }}
          UAA_CLIENT_ID: ${{ secrets.CPI_USER }}
          UAA_CLIENT_SECRET: ${{ secrets.CPI_PASSWORD }}
        run: |
          set -e
          echo "Fetching OAuth token..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$UAA_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "$UAA_CLIENT_ID:$UAA_CLIENT_SECRET" \
            -d "grant_type=client_credentials")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Token-Request fehlgeschlagen (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

          echo "$BODY" | jq -r '.access_token' > oauth_token.txt
          echo "Token erhalten"

      # ------------------------------------------------------------
      # 2. GET: Designtime Artifacts abrufen
      # ------------------------------------------------------------
      - name: Get Designtime Artifacts
        env:
          CPI_BASE_URL: ${{ secrets.CPI_BASE_URL }}
          PACKAGE_ID: ${{ github.event.inputs.package_id }}
        run: |
          set -e

          TOKEN=$(cat oauth_token.txt)

          curl -s --fail \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/xml" \
            "$CPI_BASE_URL/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
            -o response.xml

          echo "response.xml gespeichert ($(wc -c < response.xml) Bytes)"

      # ------------------------------------------------------------
      # 3. Id + Version extrahieren (Python)
      # ------------------------------------------------------------
      - name: Extract iFlow IDs and Versions
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          import os

          ns = {
              "atom": "http://www.w3.org/2005/Atom",
              "d": "http://schemas.microsoft.com/ado/2007/08/dataservices"
          }

          tree = ET.parse("response.xml")
          root = tree.getroot()

          entries = root.findall(".//atom:entry", ns)

          with open("artifacts.txt", "w") as f:
              for e in entries:
                  id_el = e.find(".//d:Id", ns)
                  v_el = e.find(".//d:Version", ns)
                  if id_el is not None and v_el is not None:
                      f.write(f"{id_el.text.strip()}:{v_el.text.strip()}\n")

          print("artifacts.txt erstellt")
          PY

          cat artifacts.txt

      # ------------------------------------------------------------
      # 4. Artifacts verarbeiten (Download → Modify → Upload)
      # ------------------------------------------------------------
      - name: Process Artifacts
        env:
          PIPER_apiServiceKey: ${{ secrets.CPIDOWNLOADKEY }}
          PIPER_verbose: 'true'
        run: |
          set -e

          mkdir -p downloaded_artifacts downloaded_artifacts_qas workdir

          while IFS=":" read -r artifactID artifactVersion; do
            [ -z "$artifactID" ] && continue
            [ -z "$artifactVersion" ] && continue

            echo "======================================"
            echo "Processing $artifactID:$artifactVersion"
            echo "======================================"

            # Download iFlow
            piper integrationArtifactDownload \
              --downloadPath downloaded_artifacts \
              --integrationFlowId "$artifactID" \
              --integrationFlowVersion "$artifactVersion"

            # Unzip
            rm -rf workdir/*
            unzip downloaded_artifacts/$artifactID.zip -d workdir

            # Update MANIFEST.MF
            find workdir -type f -path "*/META-INF/MANIFEST.MF" | while read mf; do
              sed -i -E '
                /^Bundle-SymbolicName:/ {
                  s/^Bundle-SymbolicName: ([^;_]+)(_qas)?(;.*)?$/Bundle-SymbolicName: \1_qas\3/
                }
              ' "$mf"

              sed -i -E '
                /^Origin-Bundle-SymbolicName:/ {
                  s/^Origin-Bundle-SymbolicName:[[:space:]]*([^[:space:]]+)(_qas)?$/Origin-Bundle-SymbolicName: \1_qas/
                }
              ' "$mf"
            done

            # Zip QAS artifact
            artifactID_qas="${artifactID}_qas"
            cd workdir
            zip -r "../downloaded_artifacts_qas/$artifactID_qas.zip" .
            cd ..

            # Commit (optional)
            git add downloaded_artifacts_qas/
            git commit -m "Create QAS artifact for $artifactID" || true
            git push || true

            # Upload / Deploy
            piper integrationArtifactUpload \
              --integrationFlowId "_qas" \
              --integrationFlowName "$artifactID_qas" \
              --packageId "${{ github.event.inputs.package_id }}QAS" \
              --filePath "downloaded_artifacts_qas/$artifactID_qas.zip"

          done < artifacts.txt
