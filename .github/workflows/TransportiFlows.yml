name: Extract iFlow IDs from CPI Package and prepare QAS versions

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Technical Package ID'
        required: true
        type: string

permissions:
  contents: write          # für checkout + commit
  actions: write           # empfohlen, wenn du andere Workflows triggerst

jobs:
  extract-and-process-iflows:
    runs-on: ubuntu-latest
    steps:
      # ────────────────────────────────────────────────
      # Checkout Repository
      # ────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. OAuth2 Token holen
      - name: Get OAuth Token
        env:
          UAA_TOKEN_URL: ${{ secrets.UAA_TOKEN_URL }}
          UAA_CLIENT_ID: ${{ secrets.CPI_USER }}
          UAA_CLIENT_SECRET: ${{ secrets.CPI_PASSWORD }}
        run: |
          # dein bestehender curl + jq Code – unverändert
          echo "Fetching OAuth token..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$UAA_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "$UAA_CLIENT_ID:$UAA_CLIENT_SECRET" \
            -d "grant_type=client_credentials")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Token-Request fehlgeschlagen (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
          echo "$BODY" | jq -r '.access_token' > oauth_token.txt
          echo "Token erhalten (Länge: $(wc -c < oauth_token.txt))"

      # 2. Designtime Artifacts abrufen
      - name: Get Designtime Artifacts
        env:
          CPI_BASE_URL: ${{ secrets.CPI_BASE_URL }}
          PACKAGE_ID: ${{ inputs.package_id }}
        run: |
          set -e
          echo "Package ID : $PACKAGE_ID"
          echo "Base URL   : $CPI_BASE_URL"
          TOKEN=$(cat oauth_token.txt)
          curl --fail-with-body \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/xml" \
            "$CPI_BASE_URL/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
            -o response.xml
          echo "response.xml gespeichert ($(wc -c < response.xml) Bytes)"

      # 3. iFlow IDs + Versionen extrahieren (Python)
      - name: Extract iFlow IDs and Versions (Python)
        run: |
          # dein Python-Code – ich habe error-handling etwas robuster gemacht
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          import os
          XML_FILE = "response.xml"
          if not os.path.isfile(XML_FILE) or os.path.getsize(XML_FILE) == 0:
              print("FEHLER: response.xml existiert nicht oder ist leer!")
              exit(1)
          try:
              tree = ET.parse(XML_FILE)
              root = tree.getroot()
          except Exception as e:
              print(f"XML-Parsing fehlgeschlagen: {e}")
              exit(1)
          ns = {
              "atom": "http://www.w3.org/2005/Atom",
              "d": "http://schemas.microsoft.com/ado/2007/08/dataservices"
          }
          entries = root.findall(".//atom:entry", ns)
          with open("artifacts.txt", "w", encoding="utf-8") as f:
              for entry in entries:
                  id_elem   = entry.find(".//d:Id", ns)
                  version_elem = entry.find(".//d:Version", ns)
                  if id_elem is not None and version_elem is not None:
                      id_val   = (id_elem.text or "").strip()
                      ver_val  = (version_elem.text or "").strip()
                      if id_val and ver_val:
                          f.write(f"{id_val}:{ver_val}\n")
          PY
          echo "======================================"
          echo "Inhalt von artifacts.txt:"
          cat artifacts.txt || echo "(leer)"
          echo "======================================"

      # 3b. artifacts.txt committen
      - name: Commit artifacts.txt to repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ ! -s artifacts.txt ]; then
            echo "WARNUNG: artifacts.txt ist leer – trotzdem fortfahren?"
            # exit 1   # ← optional: hier exit, wenn leer = Fehler
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts.txt
          if git diff --cached --quiet; then
            echo "Keine Änderungen an artifacts.txt"
          else
            git commit -m "Update artifacts.txt from CPI package ${{ inputs.package_id }}"
            git push origin HEAD:${{ github.ref_name }}
            echo "artifacts.txt committed & pushed"
          fi

  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check if artifacts.txt exists
        id: check
        run: |
          if [ ! -f artifacts.txt ]; then
            echo "FEHLER: artifacts.txt nicht gefunden!"
            exit 1
          fi
          echo "artifacts.txt gefunden ($(wc -l < artifacts.txt) Zeilen)"

      - name: Generate dynamic matrix from artifacts.txt
        id: generate
        run: |
          jq -R -s -c '
            split("\n") |
            map(select(length > 0 and contains(":"))) |
            map(split(":")) |
            map({artifact_id: .[0] | rtrimstr(" "), artifact_version: .[1] | ltrimstr(" ")}) |
            {include: .}
          ' artifacts.txt > matrix.json

          cat matrix.json
          echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT

  process-iflows:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download IFlow from SAP Cloud Integration
        uses: SAP/project-piper-action@v1.22.6
        with:
          step-name: integrationArtifactDownload
          flags: >-
            --downloadPath downloaded_artifacts
            --integrationFlowId ${{ matrix.artifact_id }}
            --integrationFlowVersion ${{ matrix.artifact_version }}
        env:
          PIPER_apiServiceKey: ${{ secrets.CPIDOWNLOADKEY }}
          PIPER_verbose: 'true'

      - name: Unzip iFlow
        run: |
          mkdir -p workdir
          unzip -o "downloaded_artifacts/${{ matrix.artifact_id }}.zip" -d workdir

      - name: Update MANIFEST.MF (_qas suffix)
        run: |
          find workdir -type f -path "*/META-INF/MANIFEST.MF" | while read -r manifest; do
            echo "Updating $manifest"
            sed -i -E '
              /^Bundle-SymbolicName:/ {
                s/^Bundle-SymbolicName: ([^;_]+)(_qas)?(;.*)?$/Bundle-SymbolicName: \1_qas\3/
              }
              /^Origin-Bundle-SymbolicName:/ {
                s/^Origin-Bundle-SymbolicName:[[:space:]]*([^[:space:]]+)(_qas)?$/Origin-Bundle-SymbolicName: \1_qas/
              }
            ' "$manifest"
          done

      - name: Prepare QAS artifact directory
        run: |
          mkdir -p downloaded_artifacts_qas

      - name: Zip modified iFlow (QAS)
        run: |
          cd workdir
          zip -r "../downloaded_artifacts_qas/${{ matrix.artifact_id }}_qas.zip" .
          cd ..

      - name: Commit QAS artifact (optional)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloaded_artifacts_qas/
          git commit -m "Create QAS artifact for ${{ matrix.artifact_id }} (v${{ matrix.artifact_version }})" || echo "No changes to commit"
          git push || echo "Push nicht nötig oder fehlgeschlagen"

      - name: Upload/Deploy modified IFlow to QAS Tenant
        uses: SAP/project-piper-action@v1.22.6
        with:
          step-name: integrationArtifactUpload
          flags: >-
            --integrationFlowId ${{ matrix.artifact_id }}_qas
            --packageId ${{ inputs.packageID }}QAS
            --filePath downloaded_artifacts_qas/${{ matrix.artifact_id }}_qas.zip
        env:
          PIPER_apiServiceKey: ${{ secrets.CPIDOWNLOADKEY }}
