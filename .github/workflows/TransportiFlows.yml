name: Extract iFlow IDs from CPI Package + Transport to QAS

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Technical Package ID'
        required: true
        type: string

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get OAuth Token
        env:
          UAA_TOKEN_URL:     ${{ secrets.UAA_TOKEN_URL }}
          UAA_CLIENT_ID:     ${{ secrets.CPI_USER }}
          UAA_CLIENT_SECRET: ${{ secrets.CPI_PASSWORD }}
        run: |
          set -e
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$UAA_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "$UAA_CLIENT_ID:$UAA_CLIENT_SECRET" \
            -d "grant_type=client_credentials")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Token-Request fehlgeschlagen (HTTP $HTTP_CODE)"
            echo "$BODY" >&2
            exit 1
          fi
          echo "$BODY" | jq -r '.access_token' > oauth_token.txt

      - name: Get Designtime Artifacts
        env:
          CPI_BASE_URL: ${{ secrets.CPI_BASE_URL }}
          PACKAGE_ID:   ${{ inputs.package_id }}
        run: |
          set -e
          TOKEN=$(cat oauth_token.txt)
          curl --fail-with-body -s \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/xml" \
            "$CPI_BASE_URL/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
            -o response.xml

      - name: Extract iFlow IDs and Versions
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ns = {
              "atom": "http://www.w3.org/2005/Atom",
              "d":    "http://schemas.microsoft.com/ado/2007/08/dataservices"
          }
          tree = ET.parse("response.xml")
          root = tree.getroot()
          entries = root.findall(".//atom:entry", ns)
          with open("artifacts.txt", "w", encoding="utf-8") as f:
              for e in entries:
                  id_el = e.find(".//d:Id", ns)
                  v_el = e.find(".//d:Version", ns)
                  if id_el is not None and v_el is not None:
                      id_text = (id_el.text or "").strip()
                      v_text  = (v_el.text  or "").strip()
                      if id_text and v_text:
                          f.write(f"{id_text}:{v_text}\n")
          PY
          cat artifacts.txt || echo "(keine Artefakte gefunden)"

      - name: Generate matrix
        id: generate-matrix
        run: |
          if [ ! -s artifacts.txt ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          jq -R -s -c '
            split("\n")
            | map(select(length>0 | not(startswith(" "))))
            | map(split(":") | select(length==2))
            | map({
                iFlowId: .[0] | gsub("\\s+$";""),
                artifactVersion: .[1] | gsub("^\\s+";""),
                packageId: "${{ inputs.package_id }}"
              })
            | {include: .}
          ' artifacts.txt > matrix.json

          cat matrix.json | jq .
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  transport-qas:
    needs: extract
    if: ${{ needs.extract.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.extract.outputs.matrix) }}

    runs-on: ubuntu-latest
    name: Transport ${{ matrix.iFlowId }} → QAS

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download iFlow
        uses: SAP/project-piper-action@v1.22.6
        with:
          step-name: integrationArtifactDownload
          flags: >-
            --downloadPath downloaded
            --integrationFlowId ${{ matrix.iFlowId }}
            --integrationFlowVersion ${{ matrix.artifactVersion }}
        env:
          PIPER_apiServiceKey: ${{ secrets.CPIDOWNLOADKEY }}
          PIPER_verbose: 'true'

      - name: Unzip iFlow
        run: |
          mkdir -p workdir
          unzip "downloaded/${{ matrix.iFlowId }}.zip" -d workdir

      - name: Modify MANIFEST.MF (_qas suffix)
        run: |
          find workdir -type f -path "*/META-INF/MANIFEST.MF" | while read -r mf; do
            sed -i -E 's/^Bundle-SymbolicName: ([^;_]+)(_qas)?(;.*)?$/Bundle-SymbolicName: \1_qas\3/' "$mf"
            sed -i -E 's/^Origin-Bundle-SymbolicName:[[:space:]]*([^[:space:]]+)(_qas)?$/Origin-Bundle-SymbolicName: \1_qas/' "$mf"
          done

      - name: Zip QAS version
        run: |
          cd workdir
          zip -r "../${{ matrix.iFlowId }}_qas.zip" .
          cd ..

      - name: Upload QAS iFlow
        uses: SAP/project-piper-action@v1.22.6
        with:
          step-name: integrationArtifactUpload
          flags: >-
            --integrationFlowId ${{ matrix.iFlowId }}_QAS
            --integrationFlowName ${{ matrix.iFlowId }}_qas
            --packageId ${{ matrix.packageId }}QAS
            --filePath "${{ matrix.iFlowId }}_qas.zip"
        env:
          PIPER_apiServiceKey: ${{ secrets.CPIDOWNLOADKEY }}
