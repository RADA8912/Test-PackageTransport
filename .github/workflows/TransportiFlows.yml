name: Extract iFlow IDs from CPI Package

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Technical Package ID'
        required: true
        type: string

jobs:
  extract-iflow-ids:
    runs-on: ubuntu-latest
    steps:
      # ------------------------------------------------------------
      # 1. OAuth2 Token holen (Client Credentials Grant)
      # ------------------------------------------------------------
      - name: Get OAuth Token
        env:
          UAA_TOKEN_URL: ${{ secrets.UAA_TOKEN_URL }}
          UAA_CLIENT_ID: ${{ secrets.CPI_USER }}
          UAA_CLIENT_SECRET: ${{ secrets.CPI_PASSWORD }}
        run: |
          echo "Fetching OAuth token..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$UAA_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "$UAA_CLIENT_ID:$UAA_CLIENT_SECRET" \
            -d "grant_type=client_credentials")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Token-Request fehlgeschlagen (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
          
          echo "$BODY" | jq -r '.access_token' > oauth_token.txt
          echo "Token erhalten (Länge: $(wc -c < oauth_token.txt))"

      # ------------------------------------------------------------
      # 2. GET: Alle Designtime Artifacts des Packages abrufen
      # ------------------------------------------------------------
      - name: Get Designtime Artifacts
        env:
          CPI_BASE_URL: ${{ secrets.CPI_BASE_URL }}
          PACKAGE_ID: ${{ github.event.inputs.package_id }}
        run: |
          echo "Package ID: $PACKAGE_ID"
          
          URL="$CPI_BASE_URL/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts"
          
          curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $(cat oauth_token.txt)" \
            -H "Accept: application/xml" \
            "$URL" \
            -o artifacts_response.xml
          
          HTTP_STATUS=$(tail -n1 artifacts_response.xml)
          sed -i '$d' artifacts_response.xml
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "GET fehlgeschlagen (HTTP $HTTP_STATUS)"
            cat artifacts_response.xml
            exit 1
          fi
          
          echo "Response erfolgreich erhalten"

      # ------------------------------------------------------------
      # 3a. xmllint installieren (libxml2-utils)
      # ------------------------------------------------------------
      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      # ------------------------------------------------------------
      # 3. d:Id UND d:Version extrahieren mit XPath (xmllint)
      # ------------------------------------------------------------
      - name: Extract d:Id and d:Version from Atom XML (XPath)
        run: |
          set -e

          XML_FILE="artifacts_response.xml"

          # Anzahl der <entry>-Elemente ermitteln
          ENTRY_COUNT=$(xmllint --xpath \
            "count(/*[local-name()='feed']/*[local-name()='entry'])" \
            "$XML_FILE")

          ENTRY_COUNT=${ENTRY_COUNT%.*}

          if [ "$ENTRY_COUNT" -eq 0 ]; then
            echo "Keine <entry>-Elemente gefunden"
            exit 1
          fi

          echo "Gefundene Artifacts: $ENTRY_COUNT"
          echo ""

          > artifacts.txt

          for i in $(seq 1 "$ENTRY_COUNT"); do
            ID=$(xmllint --xpath \
              "string((/*[local-name()='feed']/*[local-name()='entry'][$i]//*[local-name()='Id'])[1])" \
              "$XML_FILE")

            VERSION=$(xmllint --xpath \
              "string((/*[local-name()='feed']/*[local-name()='entry'][$i]//*[local-name()='Version'])[1])" \
              "$XML_FILE")

            if [ -n "$ID" ] && [ -n "$VERSION" ]; then
              echo "- $ID (Version $VERSION)"
              echo "$ID:$VERSION" >> artifacts.txt
            fi
          done

          echo ""
          echo "======================================"
          echo "Gespeichert in artifacts.txt:"
          cat artifacts.txt
          echo "======================================"
