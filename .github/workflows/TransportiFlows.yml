name: Extract iFlow IDs from CPI Package and prepare QAS versions

on:
  workflow_dispatch:
    inputs:
      package_id:
        description: 'Technical Package ID'
        required: true
        type: string

permissions:
  contents: write

jobs:
  extract-and-process-iflows:
    runs-on: ubuntu-latest
    
    steps:
    
      # ────────────────────────────────────────────────
      # 1. OAuth2 Token holen (Client Credentials)
      # ────────────────────────────────────────────────
      - name: Get OAuth Token
        env:
          UAA_TOKEN_URL: ${{ secrets.UAA_TOKEN_URL }}
          UAA_CLIENT_ID: ${{ secrets.CPI_USER }}
          UAA_CLIENT_SECRET: ${{ secrets.CPI_PASSWORD }}
        run: |
          echo "Fetching OAuth token..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$UAA_TOKEN_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -u "$UAA_CLIENT_ID:$UAA_CLIENT_SECRET" \
            -d "grant_type=client_credentials")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Token-Request fehlgeschlagen (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
          echo "$BODY" | jq -r '.access_token' > oauth_token.txt
          echo "Token erhalten (Länge: $(wc -c < oauth_token.txt))"

      # ────────────────────────────────────────────────
      # 2. Designtime Artifacts abrufen
      # ────────────────────────────────────────────────
      - name: Get Designtime Artifacts
        env:
          CPI_BASE_URL: ${{ secrets.CPI_BASE_URL }}
          PACKAGE_ID: ${{ inputs.package_id }}
        run: |
          set -e
          echo "Package ID : $PACKAGE_ID"
          echo "Base URL   : $CPI_BASE_URL"
          TOKEN=$(cat oauth_token.txt)
          echo "Token length : ${#TOKEN} Zeichen"

          curl --fail-with-body \
            -w "\n---HTTP_STATUS:%{http_code}\n---EFFECTIVE_URL:%{url_effective}\n---SIZE:%{size_download}\n" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/xml" \
            "$CPI_BASE_URL/api/v1/IntegrationPackages('$PACKAGE_ID')/IntegrationDesigntimeArtifacts" \
            -o response_body.xml \
            --dump-header response_headers.txt \
            --trace-ascii curl_trace.log

          CURL_EXIT=$?
          HTTP_STATUS=$(grep "^---HTTP_STATUS:" curl_trace.log | cut -d: -f2 | tr -d '[:space:]' || echo "000")

          if [ "$CURL_EXIT" -ne 0 ] || [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -gt 299 ]; then
            echo "Request FEHLGESCHLAGEN – HTTP $HTTP_STATUS"
            echo "Body (falls vorhanden):"
            cat response_body.xml || echo "(leer)"
            echo "Trace (letzte 60 Zeilen):"
            tail -n 60 curl_trace.log
            exit 1
          fi

          mv response_body.xml response.xml
          echo "Erfolgreich gespeichert → response.xml ($(wc -c < response.xml) Bytes)"
          head -n 12 response.xml

      # ────────────────────────────────────────────────
      # 3. iFlow IDs + Versionen extrahieren (Python)
      # ────────────────────────────────────────────────
      - name: Extract iFlow IDs and Versions (Python)
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          import os

          XML_FILE = "response.xml"
          if not os.path.isfile(XML_FILE) or os.path.getsize(XML_FILE) == 0:
              print("FEHLER: response.xml existiert nicht oder ist leer!")
              exit(1)

          try:
              tree = ET.parse(XML_FILE)
              root = tree.getroot()
          except Exception as e:
              print(f"XML-Parsing fehlgeschlagen: {e}")
              with open(XML_FILE, "r", encoding="utf-8") as f:
                  print(f.read(800))
              exit(1)

          ns = {
              "atom": "http://www.w3.org/2005/Atom",
              "d": "http://schemas.microsoft.com/ado/2007/08/dataservices"
          }

          entries = root.findall(".//atom:entry", ns)
          print(f"Gefundene <entry>-Elemente: {len(entries)}\n")

          if len(entries) == 0:
              print("Keine Einträge gefunden. Roh-XML-Auszug:")
              print(ET.tostring(root, encoding="unicode")[:1500])
              exit(1)

          with open("artifacts.txt", "w", encoding="utf-8") as f:
              for entry in entries:
                  id_elem = entry.find(".//d:Id", ns)
                  version_elem = entry.find(".//d:Version", ns)
                  if id_elem is not None and version_elem is not None:
                      id_val = (id_elem.text or "").strip()
                      ver_val = (version_elem.text or "").strip()
                      if id_val and ver_val:
                          print(f"- {id_val} (Version {ver_val})")
                          f.write(f"{id_val}:{ver_val}\n")
          PY

          echo "======================================"
          echo "Inhalt von artifacts.txt:"
          cat artifacts.txt || echo "(Datei leer)"
          echo "======================================"

      # ────────────────────────────────────────────────
      # 4. Schleife: Download → Modify → Upload pro iFlow
      # ────────────────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Process each iFlow sequentially via gh workflow run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          if [ ! -f artifacts.txt ]; then
            echo "FEHLER: artifacts.txt nicht gefunden!"
            exit 1
          fi

          while IFS=: read -r artifactId artifactVersion; do
            [ -z "$artifactId" ] && continue

            echo "Triggering transportScenarioFlow for $artifactId @ $artifactVersion"

            gh workflow run transportScenarioFlow.yml \
              --ref "${{ github.ref_name }}" \
              -f artifact_id="$artifactId" \
              -f artifact_version="$artifactVersion" \
              -f package_id="${{ inputs.package_id }}"

            # Schutz vor GitHub API Rate Limits
            sleep 3

          done < artifacts.txt

          echo "Alle Workflows getriggert."
