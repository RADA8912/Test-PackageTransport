name: SAP Cloud Integration - Transport

on:
  workflow_dispatch:
    inputs:
      iFlowId:
        description: 'Artifact Id'
        required: true
      artifactVersion:
        description: 'Version of the Artifact'
        required: true
      packageID:
        description: 'Package ID for upload'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔹 Download iFlow
      - name: Download IFlow from SAP Cloud Integration
        uses: SAP/project-piper-action@v1.22.6
        with:
          step-name: integrationArtifactDownload
          flags: >-
            --downloadPath downloaded_artifacts
            --integrationFlowId ${{ github.event.inputs.iFlowId }}
            --integrationFlowVersion ${{ github.event.inputs.artifactVersion }}
        env:
          PIPER_apiServiceKey: ${{ secrets.CPIDOWNLOADKEY }}
          PIPER_verbose: 'true'

      # 🔹 Unzip iFlow
      - name: Unzip iFlow
        run: |
          mkdir -p workdir
          unzip downloaded_artifacts/${{ github.event.inputs.iFlowId }}.zip -d workdir

      # 🔹 Manipulate MANIFEST.MF
      - name: Update MANIFEST.MF (_qas)
        run: |
          find workdir -type f -path "*/META-INF/MANIFEST.MF" | while read manifest; do
            echo "Updating $manifest"

            # Bundle-SymbolicName → nur Teil vor ;
            sed -i -E '
              /^Bundle-SymbolicName:/ {
                s/^Bundle-SymbolicName: ([^;_]+)(_qas)?(;.*)?$/Bundle-SymbolicName: \1_qas\3/
              }
            ' "$manifest"

            # Origin-Bundle-SymbolicName (Komplett EINZEILIG)
            sed -i -E '
              /^Origin-Bundle-SymbolicName:/ {
                s/^Origin-Bundle-SymbolicName:[[:space:]]*([^[:space:]]+)(_qas)?$/Origin-Bundle-SymbolicName: \1_qas/
              }
            ' "$manifest"

          done

      # 🔹 Prepare QAS artifact directory
      - name: Prepare QAS artifact directory
        run: |
          mkdir -p downloaded_artifacts_qas

      # 🔹 Rezip iFlow → QAS-Verzeichnis
      - name: Zip modified iFlow (QAS)
        run: |
          cd workdir
          zip -r ../downloaded_artifacts_qas/${{ github.event.inputs.iFlowId }}_qas.zip .
          cd ..

      # 🔹 Commit QAS artifact (optional aber sauber)
      - name: Commit QAS iFlow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloaded_artifacts_qas/
          git commit -m "Create QAS artifact for ${{ github.event.inputs.iFlowId }}" || echo "No changes"
          git push

      # 🔹 Upload/Deploy IFlow to Tenant 
      - name: Upload/Deploy IFlow to Tenant 
        uses: SAP/project-piper-action@v1.22.6
        with:
          step-name: integrationArtifactUpload
          flags: >-
            --integrationFlowId ${{ github.event.inputs.iFlowId }}_QAS
            --integrationFlowName ${{ github.event.inputs.iFlowId }}_qas
            --packageId ${{ github.event.inputs.packageID }}
            --filePath downloaded_artifacts_qas/${{ github.event.inputs.iFlowId }}_qas.zip
        env:
          PIPER_apiServiceKey: ${{ secrets.CPIDOWNLOADKEY }}
